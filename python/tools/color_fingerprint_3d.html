<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Color Fingerprint — Radial</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:-apple-system,'Helvetica Neue',sans-serif}
canvas{display:block}
#ui{position:fixed;top:12px;left:12px;z-index:999;color:#bbb;background:rgba(12,12,14,.92);padding:14px 18px;border-radius:10px;border:1px solid #2a2a2e;line-height:1.9;max-width:260px;font-size:11.5px}
#ui button{background:#222;color:#ccc;border:1px solid #444;padding:5px 13px;cursor:pointer;border-radius:5px;font-size:11px;margin-right:6px;margin-bottom:4px;font-family:inherit}
#ui button:hover{background:#333;color:#fff}
#ui input[type=file]{color:#999;margin-top:6px;font-size:10.5px}
.hint{margin-top:8px;color:#555;font-size:10px;line-height:1.5}
</style>
</head>
<body>
<div id="ui">
<div><button id="btnR">Auto Rotate: ON</button></div>
<div><input type="file" id="inp" accept="image/*"> Upload strip image</div>
<div class="hint">Drag to rotate / scroll to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){function OC(o,e){this.object=o;this.domElement=e||document;this.enabled=true;this.target=new THREE.Vector3();this.enableDamping=false;this.dampingFactor=.05;this.autoRotate=false;this.autoRotateSpeed=2;this.minDistance=0;this.maxDistance=Infinity;var S=this,s=new THREE.Spherical(),ds=new THREE.Spherical(),sc=1,RS=new THREE.Vector2(),RE=new THREE.Vector2(),RD=new THREE.Vector2(),st={N:-1,R:0,P:1},state=st.N;this.update=function(){var o=this.object,v=new THREE.Vector3().copy(o.position).sub(this.target);s.setFromVector3(v);if(this.autoRotate)s.theta-=this.autoRotateSpeed*.001;s.theta+=ds.theta;s.phi+=ds.phi;s.phi=Math.max(.01,Math.min(Math.PI-.01,s.phi));s.radius*=sc;s.radius=Math.max(this.minDistance,Math.min(this.maxDistance,s.radius));if(this.enableDamping){ds.theta*=1-this.dampingFactor;ds.phi*=1-this.dampingFactor}else ds.set(0,0,0);sc=1;v.setFromSpherical(s);o.position.copy(this.target).add(v);o.lookAt(this.target);return true};this.dispose=function(){};function md(e){if(!this.enabled)return;e.preventDefault();e.button===0?(state=st.R,RS.set(e.clientX,e.clientY)):e.button===2&&(state=st.P);if(state!==st.N){document.addEventListener('mousemove',mm,false);document.addEventListener('mouseup',mu,false)}}function mm(e){if(!this.enabled)return;e.preventDefault();if(state===st.R){RE.set(e.clientX,e.clientY);RD.subVectors(RE,RS).multiplyScalar(.005);RS.copy(RE)}}function mu(){if(!this.enabled)return;document.removeEventListener('mousemove',mm,false);document.removeEventListener('mouseup',mu,false);state=st.N}function mw(e){if(!this.enabled)return;e.preventDefault();e.deltaY<0?sc*=.95:sc*=1.05}this.domElement.addEventListener('mousedown',md,false);this.domElement.addEventListener('wheel',mw,{passive:false})}THREE.OrbitControls=OC})();

var scene,camera,renderer,controls,root;
var CATS=[
{name:"RED",c:[255,45,45],hMin:345,hMax:15},
{name:"SKIN",c:[255,175,130],hMin:15,hMax:75},
{name:"YELLOW",c:[240,225,35],hMin:75,hMax:105},
{name:"GREEN",c:[50,220,60],hMin:105,hMax:195},
{name:"CYAN",c:[30,225,255],hMin:195,hMax:225},
{name:"BLUE",c:[55,105,255],hMin:225,hMax:285},
{name:"MAGENTA",c:[225,45,225],hMin:285,hMax:345}
];
var freq=[.04,.65,.02,.09,.15,.03,.02];

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x020204);
camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,.1,500);
camera.position.set(0,8,38);
renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.15;
document.body.appendChild(renderer.domElement);
controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;
controls.dampingFactor=.04;
controls.autoRotate=true;
controls.autoRotateSpeed=.4;

scene.add(new THREE.AmbientLight(0x18181f,.6));
var kL=new THREE.DirectionalLight(0xffeedd,.9);kL.position.set(6,12,10);scene.add(kL);
var fL=new THREE.DirectionalLight(0x4466aa,.25);fL.position.set(-6,3,-6);scene.add(fL);

build();
document.getElementById("btnR").onclick=function(){controls.autoRotate=!controls.autoRotate;this.textContent="Auto Rotate: "+(controls.autoRotate?"ON":"OFF")};
document.getElementById("inp").onchange=function(e){var f=e.target.files[0];if(!f)return;var r=new FileReader();r.onload=function(ev){var img=new Image();img.onload=function(){freq=analyze(img);build()};img.src=ev.target.result};r.readAsDataURL(f)};
addEventListener("resize",function(){camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
animate()
}

function build(){
if(root)scene.remove(root);
root=new THREE.Group();

var R_DISK=9;
var R_OUTER=18;
var DISK_H=.35;
var SPH_Y=2.5;
var N_TUBES=Math.round(80*Math.max.apply(null,freq));
var segAngle=(Math.PI*2)/CATS.length;

// === ZONE 1: COLOR DISK ===
for(var i=0;i<CATS.length;i++){
  var cat=CATS[i];var f=freq[i];
  var aStart=i*segAngle-Math.PI;var aEnd=(i+1)*segAngle-Math.PI;
  var shape=new THREE.Shape();
  shape.absarc(0,0,R_DISK-.05,aStart,aEnd,false);
  shape.absarc(0,0,R_DISK+.05,aEnd,aStart,false);
  var geo=new THREE.ExtrudeGeometry(shape,{depth:DISK_H,bevelEnabled:false,bevelThickness:0});
  var hScale=0.7+f*0.6;
  geo.scale(1,hScale,1);
  var mat=new THREE.MeshStandardMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    emissive:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    emissiveIntensity:0.30+f*0.5,
    metalness:.02,roughness:.35,side:THREE.DoubleSide
  });
  var mesh=new THREE.Mesh(geo,mat);
  mesh.rotation.x=-Math.PI/2;
  root.add(mesh);

  // Edge glow pillar
  var ex=Math.cos(aStart)*R_DISK,ez=Math.sin(aStart)*R_DISK;
  var eGeo=new THREE.CylinderGeometry(.04,.04,DISK_H*hScale*1.5+.15,6);
  var eMat=new THREE.MeshBasicMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    transparent:true,opacity:.55,blending:THREE.AdditiveBlending
  });
  var ep=new THREE.Mesh(eGeo,eMat);
  ep.position.set(ex,DISK_H*hScale*.75+.07,ez);
  root.add(ep);
}

// Center polar bars
var centerR=R_DISK*.45;
for(var i=0;i<CATS.length;i++){
  var cat=CATS[i];var f=freq[i];
  var aCenter=i*segAngle-Math.PI+segAngle/2;
  var barH=centerR*(.15+f*.75);
  if(barH<.15)continue;
  var bGeo=new THREE.BoxGeometry(.25,barH,.06);
  var bMat=new THREE.MeshBasicMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    transparent:true,opacity:.7,blending:THREE.AdditiveBlending
  });
  var bar=new THREE.Mesh(bGeo,bMat);
  bar.position.set(Math.cos(aCenter)*barH/2,0,Math.sin(aCenter)*barH/2);
  bar.lookAt(new THREE.Vector3(0,0,0));
  bar.rotateZ(aCenter);
  root.add(bar);
}

// === ZONE 2: CURVED LIGHT RAYS ===
for(var t=0;t<N_TUBES;t++){
  var rv=Math.random(),cf=0,ci=0;
  for(var j=0;j<CATS.length;j++){cf+=freq[j];if(rv<=cf||j===CATS.length-1){ci=j;break}}
  var cat=CATS[ci];
  var aCat=ci*segAngle-Math.PI+segAngle/2;
  var spreadA=(segAngle/2)*.75;
  var aDisk=aCat+(Math.random()-.5)*spreadA;
  var rStart=R_DISK*(.88+Math.random()*.12);
  var px=Math.cos(aDisk)*rStart,py=0,pz=Math.sin(aDisk)*rStart;
  var rEnd=R_OUTER+(Math.random()-.5)*2;
  var elevEnd=Math.random()*.6+.2;
  var tx=Math.cos(aDisk+(Math.random()-.3)*segAngle*.5)*rEnd;
  var ty=SPH_Y+elevEnd*3;
  var tz=Math.sin(aDisk)*rEnd;
  var mY1=ty*.35,mY2=ty*.72;
  var cv=new THREE.CubicBezierCurve3(
    new THREE.Vector3(px,py,pz),
    new THREE.Vector3(px*1.15,mY1,pz*1.15),
    new THREE.Vector3(tx*.9,mY2,tz*.85),
    new THREE.Vector3(tx,ty,tz)
  );
  var tm=new THREE.MeshBasicMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    transparent:true,opacity:.40+.50*freq[ci],blending:THREE.AdditiveBlending
  });
  root.add(new THREE.Mesh(new THREE.TubeGeometry(cv,12,.032,5,false),tm));

  // Connector glow sphere at disk attachment
  var cGeo=new THREE.SphereGeometry(.06+freq[ci]*.05,8,8);
  var cMat=new THREE.MeshBasicMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    transparent:true,opacity:.7+freq[ci]*.3,blending:THREE.AdditiveBlending
  });
  var conn=new THREE.Mesh(cGeo,cMat);
  conn.position.set(px,py,pz);
  root.add(conn);
}

// === ZONE 3: GLOWING SPHERES ===
var mf=Math.max.apply(null,freq)||.01;
for(var i=0;i<CATS.length;i++){
  var cat=CATS[i];var f=freq[i];
  var aPos=i*segAngle-Math.PI+segAngle/2;
  var sx=Math.cos(aPos)*R_OUTER,sy=SPH_Y,sz=Math.sin(aPos)*R_OUTER;
  var r=.35+Math.pow(f/mf,.5)*1.0;

  var cMat=new THREE.MeshStandardMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    emissive:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    emissiveIntensity:1.2+f*1.5,
    metalness:.1,roughness:.08
  });
  var core=new THREE.Mesh(new THREE.SphereGeometry(r,28,28),cMat);
  core.position.set(sx,sy,sz);root.add(core);

  var gMat=new THREE.MeshBasicMaterial({
    color:new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    transparent:true,opacity:.14+f*.10,
    side:THREE.BackSide,blending:THREE.AdditiveBlending
  });
  var glow=new THREE.Mesh(new THREE.SphereGeometry(r*2.8,20,20),gMat);
  glow.position.set(sx,sy,sz);root.add(glow);

  var pl=new THREE.PointLight(
    new THREE.Color(cat.c[0]/255,cat.c[1]/255,cat.c[2]/255),
    .6+f*2.0,16
  );
  pl.position.set(sx,sy,sz+1);root.add(pl);
}

// Ground plane
var gp=new THREE.Mesh(
  new THREE.PlaneGeometry(50,50),
  new THREE.MeshStandardMaterial({color:0x080810,metalness:.95,roughness:.3,transparent:true,opacity:.12})
);
gp.rotation.x=-Math.PI/2;gp.position.y=SPH_Y-3;root.add(gp);

// Grid
var grid=new THREE.GridHelper(36,24,0x151520,0x0c0c14);
grid.position.y=SPH_Y-2.98;grid.material.transparent=true;grid.material.opacity=.08;root.add(grid);

scene.add(root);
}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}

function rgb2hsv(r,g,b){
r/=255;g/=255;b/=255;
var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;
var v=mx*100,s=mx===0?0:d/mx*100,h;
if(d===0)h=0;
else if(mx===r)h=60*((g-b)/d%6);
else if(mx===g)h=60*((b-r)/d+2);
else h=60*((r-g)/d+4);
if(h<0)h+=360;
return[h,s,v]
}

function analyze(img){
var c=document.createElement("canvas");
c.width=img.width;c.height=img.height;
var x=c.getContext("2d");
x.drawImage(img,0,0);
var d=x.getImageData(0,0,img.width,img.height).data;
var bins=CATS.map(function(){return{count:0}});
var tot=0,ST=3;
for(var y=0;y<img.height;y+=ST){
  for(var xx=0;xx<img.width;xx+=ST){
    var idx=(y*img.width+xx)*4;
    var R=d[idx],G=d[idx+1],B=d[idx+2],A=d[idx+3];
    if(A<30||R+G+B<25)continue;
    var hsv=rgb2hsv(R,G,B),hue=hsv[0];
    for(var bi=0;bi<CATS.length;bi++){
      var rg=CATS[bi],ok;
      if(rg.hMin>rg.hMax)ok=hue>=rg.hMin||hue<rg.hMax;
      else ok=hue>=rg.hMin&&hue<rg.hMax;
      if(ok){bins[bi].count++;break}
    }
    tot++
  }
}
return bins.map(function(b){return tot>0?b.count/tot:0})
}

init();
</script>
</body>
</html>
