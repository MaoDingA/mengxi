<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>电影指纹 — 色彩分布</title>
<script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: auto; }
  #canvas-container { position: relative; }
  canvas { display: block; }
  #ui { position: fixed; top: 12px; left: 12px; z-index: 999; font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: #aaa; background: rgba(18,18,18,0.92); padding: 14px 16px; border-radius: 8px; border: 1px solid #333; line-height: 1.8; max-width: 280px; }
  #ui button { background: #3a3a3a; color: #ddd; border: 1px solid #555; padding: 5px 14px; cursor: pointer; border-radius: 4px; font-size: 12px; font-family: inherit; }
  #ui button:hover { background: #555; color: #fff; }
  #ui input[type="file"] { color: #bbb; margin-top: 6px; font-family: inherit; font-size: 11px; }
  .hint { margin-top: 8px; color: #666; font-size: 10.5px; line-height: 1.5; }
</style>
</head>
<body>
<div id="ui">
  <div><button id="btnSave">保存 PNG</button></div>
  <div><input type="file" id="stripInput" accept="image/*"> 上传色条图片</div>
  <div class="hint">不传图则使用内置示例数据<br>刷新页面重新渲染</div>
</div>
<div id="canvas-container"></div>

<script>
const W = 1200;
const H = 1800;
const STRIP_H = Math.round(H * 0.135);   // ~243px
const FAN_TOP = STRIP_H + 2;
const SPHERE_Y = H - 740;

const CATS = [
  { name: "RED",     c: [255, 50, 50],    h: 0,   f: 0.002 },
  { name: "SKIN",    c: [255, 180, 140],  h: 45,  f: 0.121 },
  { name: "YELLOW",  c: [240, 220, 40],   h: 90,  f: 0.119 },
  { name: "GREEN",   c: [60,  210, 70],   h: 150, f: 0.138 },
  { name: "CYAN",    c: [40,  210, 220],  h: 210, f: 0.620 },
  { name: "BLUE",    c: [60,  100, 255],  h: 270, f: 0.000 },
  { name: "MAGENTA", c: [210, 50, 210],   h: 315, f: 0.000 },
];

let stripImg = null;

function setup() {
  let cnv = createCanvas(W, H);
  cnv.parent('canvas-container');
  pixelDensity(2);
  noLoop();
  randomSeed(42);
  noiseSeed(42);
  document.getElementById('btnSave').onclick = () => save('color_fingerprint.png');
  document.getElementById('stripInput').onchange = function(e) {
    let file = e.target.files[0];
    if (!file) return;
    let reader = new FileReader();
    reader.onload = function(ev) {
      loadImage(ev.target.result, img => { stripImg = img; redraw(); });
    };
    reader.readAsDataURL(file);
  };
}

function draw() {
  background(0);
  _drawStrip();
  _drawFanLines();
  _drawSpheres();
}

// ============================================================
// ZONE 1: SPECTRAL STRIP
// Dense vertical waveform lines mimicking real spectral data
// ============================================================
function _drawStrip() {
  if (stripImg) {
    image(stripImg, 0, 0, W, STRIP_H);
    return;
  }

  let barW = W / CATS.length;

  for (let i = 0; i < CATS.length; i++) {
    let cat = CATS[i];
    let xStart = i * barW;
    let xEnd = (i + 1) * barW;

    for (let x = xStart; x < xEnd; x += 0.3) {
      let t = (x - xStart) / barW;

      // Brightness gradient: dark → bright across band
      let baseBright = 0.05 + 0.95 * pow(t, 0.65);

      // Multi-scale noise for organic spectral texture
      let n1 = noise(x * 0.012, i * 7.3) * 0.38;
      let n2 = noise(x * 0.035, i * 7.3 + 50) * 0.18;
      let n3 = noise(x * 0.08, i * 7.3 + 120) * 0.08;
      let bright = baseBright * (0.58 + n1 + n2 + n3);

      // Random bright spikes (simulating real spectral peaks)
      if (random() > 0.967) bright *= random(1.5, 2.5);

      stroke(
        cat.c[0] * constrain(bright, 0, 1),
        cat.c[1] * constrain(bright, 0, 1),
        cat.c[2] * constrain(bright, 0, 1)
      );
      strokeWeight(0.45);
      line(x, 0, x, STRIP_H);
    }
  }
}

// ============================================================
// ZONE 2: UMBRELLA FAN LINES
//
// GEOMETRY MODEL:
//   Each category's lines form an umbrella/fan shape:
//   - All lines converge at sphere point (tx, ty)
//   - Source points spread across a wide region on the strip
//   - Control point pushes LATERALLY outward to create parabolic arc
//   - Edge lines have strong curvature, center lines nearly straight
//
// VISUAL STYLE:
//   - Color: bright silver-white (200-240 range), minimal tint
//   - Weight: hairline (0.2-0.5px equivalent at 2x density)
//   - Alpha: breathing pattern, center-dense edges-sparse
// ============================================================
function _drawFanLines() {
  let n = CATS.length;
  let gap = W / (n + 1);

  for (let ci = 0; ci < n; ci++) {
    let cat = CATS[ci];
    let sx = gap * (ci + 1);
    let sy = SPHERE_Y;

    // Source center on strip (hue-based)
    let srcX = _hueToX(cat.h);

    // Number of lines: proportional to fraction
    let nLines = cat.f > 0.001
      ? floor(120 + 260 * cat.f)
      : 12;
    nLines = constrain(nLines, 10, 350);

    for (let li = 0; li < nLines; li++) {
      let rawT = li / (nLines - 1 || 1);

      // --- Source point on strip ---
      // Spread width scales with fraction (bigger fraction = wider fan)
      let spreadW = W * (0.09 + cat.f * 0.32);
      let px = srcX + (rawT - 0.5) * spreadW * 2;
      px = constrain(px, 0.5, W - 0.5);
      let py = FAN_TOP;

      // --- Target point on sphere ---
      let tx = sx + random(-1.2, 1.2);
      let ty = sy + random(-1.2, 1.2);

      // --- Arc control point: UMBRELLA geometry ---
      //
      // Vector from source to target
      let dx = tx - px;
      let dy = ty - py;
      let len = sqrt(dx * dx + dy * dy) || 1;

      // Unit perpendicular (rotated 90° CCW)
      let perpX = -dy / len;
      let perpY = dx / len;

      // Lateral push magnitude:
      // - Zero at center (rawT=0.5): line goes nearly straight
      // - Maximum at edges (rawT=0 or 1): strong curve
      // Using smoothstep-like curve for natural falloff
      let edgeDist = abs(rawT - 0.5) * 2; // 0(center) → 1(edge)
      let pushMag = edgeDist * edgeDist * (3 - 2 * edgeDist); // smoothstep
      pushMag *= len * random(0.18, 0.35); // scale by distance + randomness

      // Push direction: away from the sphere's X position
      // (lines on left side of sphere push left, right side push right)
      let pushDir = (px >= sx) ? 1 : -1;

      let ctrlX = (px + tx) / 2 + pushDir * perpX * pushMag;
      let ctrlY = (py + ty) / 2 + perpY * pushMag * 0.3 + len * 0.04;

      // --- Alpha calculation ---
      // Breathing envelope (sin-based, dense center)
      let breath = pow(sin(rawT * PI), 1.25);
      // Edge fade (fan edges dimmer)
      let edgeFade = pow(1 - edgeDist, 1.4);
      // Progress fade (slightly brighter toward sphere)
      let progFade = 0.28 + 0.72 * rawT;
      // Fraction scaling
      let fScale = cat.f > 0.001 ? min(cat.f * 4.2, 1) : 0.05;

      let alpha = (0.12 + 0.55 * breath * edgeFade * progFade * fScale);

      // --- Color: matches sphere color with brightness variation ---
      let brightVar = 0.55 + random(0, 0.45);
      let cr = cat.c[0] * brightVar;
      let cg = cat.c[1] * brightVar;
      let cb = cat.c[2] * brightVar;

      stroke(
        constrain(cr, 70, 255),
        constrain(cg, 70, 255),
        constrain(cb, 70, 255),
        alpha * 255
      );
      strokeWeight(0.20 + progFade * 0.30);
      noFill();

      // Quadratic bezier via split control points for smoothness
      bezier(px, py,
             lerp(px, ctrlX, 0.35), lerp(py, ctrlY, 0.35),
             lerp(ctrlX, tx, 0.35), lerp(ctrlY, ty, 0.35),
             tx, ty);
    }
  }
}

// ============================================================
// ZONE 3: FLUORESCENT SPHERES + LABELS
// Gaussian bloom with category-colored core
// CYAN dominates with largest/brightest glow
// ============================================================
function _drawSpheres() {
  let n = CATS.length;
  let gap = W / (n + 1);
  let maxF = max(...CATS.map(c => c.f), 0.01);

  textAlign(CENTER, CENTER);
  textFont('Helvetica Neue, Arial, sans-serif');

  for (let ci = 0; ci < n; ci++) {
    let cat = CATS[ci];
    let cx = gap * (ci + 1);
    let cy = SPHERE_Y;

    // Radius: modest scaling, glow does the visual weight
    let r = cat.f > 0.001
      ? 4 + pow(cat.f / maxF, 0.55) * 22
      : 2;

    // Layered gaussian bloom — tight, contained
    noStroke();
    let totalLayers = 50;
    let glowExtent = cat.f > 0.001 ? 5 : 2.5;

    for (let layer = 0; layer < totalLayers; layer++) {
      let lt = layer / (totalLayers - 1);
      let lr, ga;

      if (lt < 0.06) {
        // Intense solid core
        lr = r * (0.15 + lt / 0.06 * 0.85);
        ga = 0.92 + lt / 0.06 * 0.08;
        fill(cat.c[0], cat.c[1], cat.c[2], ga * 255);
      } else {
        // Gaussian glow falloff — steep decay to contain spread
        let gt = (lt - 0.06) / 0.94;
        lr = r * (1.0 + gt * (glowExtent - 1.0));

        // Aggressive gaussian: exp(-x²) with high k for tight falloff
        ga = exp(-gt * gt * 6.0) * 0.28;

        // Subtle whitening in mid-glow only
        let whiten = exp(-gt * gt * 3.0) * 20;
        fill(
          min(255, cat.c[0] + whiten),
          min(255, cat.c[1] + whiten),
          min(255, cat.c[2] + whiten),
          ga * 255
        );
      }

      circle(cx, cy, lr * 2);
    }

    // Labels
    let loff = r + 20;
    fill(245);
    noStroke();
    textSize(13);
    textStyle(BOLD);
    text(cat.name, cx, cy + loff);
    fill(148);
    textSize(10);
    textStyle(NORMAL);
    text((cat.f * 100).toFixed(1) + '%', cx, cy + loff + 16);
  }
}

// ============================================================
// UTIL: hue angle → strip X coordinate
// ============================================================
function _hueToX(h) {
  if (h <= 60)   return map(h, 0, 60,   0,       W * 0.14);
  if (h <= 150) return map(h, 60, 150, W * 0.14, W * 0.44);
  if (h <= 210) return map(h, 150, 210, W * 0.44, W * 0.68);
  if (h <= 270) return map(h, 210, 270, W * 0.68, W * 0.84);
  if (h <= 315) return map(h, 270, 315, W * 0.84, W * 0.94);
  return map(h, 315, 360, W * 0.94, W);
}
</script>
</body>
</html>
